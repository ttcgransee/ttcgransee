name: TTC-Webseite aktualisieren

on:
  # Jeden Montag um 08:17 Uhr deutscher Zeit
  schedule:
    - cron: "17 8 * * 1"
      timezone: "Europe/Berlin"

  # Ermöglicht zusätzlich einen manuellen Testlauf
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ttc-webseite-aktualisieren
  cancel-in-progress: false

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v5

      - name: Python installieren
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Python-Pakete installieren
        run: python -m pip install -r requirements.txt

      - name: Crawler ausführen
        env:
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_BASE: https://api.openai.com
          OPENAI_MODEL: gpt-5.4-mini
          GENERATE_REPORTS_FROM_TEST_LEAGUE: "true"
        run: python update_website.py

      - name: Änderungen prüfen und speichern
        run: |
          git config user.name "TTC Gransee Crawler"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html data/

          if git diff --cached --quiet; then
            echo "Keine Änderungen vorhanden."
          else
            git commit -m "Webseite automatisch aktualisiert"
            git push
          fi
